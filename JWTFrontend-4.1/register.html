<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="./src/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet"  href="https://fonts.googleapis.com/css?family=Oswald">
    <script type="module" src="./src/register.js"></script>
    <title>jwtbackend-4-1</title>
  </head>
  <body>
    <header>
      <nav id="mainNav">
        <ul>
          <li>
            <a href="index.html">Startsida</a>
          </li>
          <li>
             <a href="register.html" class="active-page">Registrera konto</a>
          </li>
        </ul>
      </nav>
    </header>
<main>
    <section id="registerMain"> 
        <h2>Registrera ditt konto nedan</h2>
        <ul id="errorList">
          
        </ul>
        <form id="registerForm">
        <label for="username"><u>Användarnamn</u></label>
        <input type="text" name="username" id="username">
        <label for="password"><u>Lösenord</u></label>
        <input type="password" name="password" id="password">
        <label for="verifyPassword"><u>Bekräfta lösenord</u></label>
        <input type="password" name="verifyPassword" id="verifyPassword">
        <label for="firstname">Förnamn</label>
        <input type="text" id="firstname" name="firstname">
        <label for="surname">Efternamn</label>
        <input type="text" id="surname" name="surname">
        <label for="email"><u>E-post</u></label>
        <input type="text" id="email" name="email">
        <label for="birthdate"><u>Födelsedatum</u></label>
        <input type="date" name="birthdate" id="birthdate">
        <input type="submit" value="Skapa konto" id="register" formmethod="post">
        </form>
        
        <p id="success"></p>
      </section>
</main>
  </body>
</html>
